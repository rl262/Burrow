name: Bug report
description: Report a problem installing or running Burrow
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Burrow is validated on **Ubuntu 24.04** and supported-but-unverified elsewhere, so the OS / version / log details below are essential to diagnose a problem. Please don't use this for security issues — see [SECURITY.md](https://github.com/rl262/Burrow/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you did, what you expected, and what actually happened.
      placeholder: "Ran install.sh on Debian 12; it aborted at '...'."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Burrow version
      description: "Output of: cat /etc/burrow/VERSION  (or the tag/commit you installed)"
      placeholder: "burrow 0.1.0-alpha.1 (ref v0.1.0-alpha.1)"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      description: 'Output of: . /etc/os-release; echo "$PRETTY_NAME $(uname -m)"'
      placeholder: "Debian GNU/Linux 12 (bookworm) x86_64"
    validations:
      required: true
  - type: textarea
    id: install-mode
    attributes:
      label: How did you install?
      description: The exact command (curl|bash, download+run, any env vars or BURROW_REF set).
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: |
        Paste relevant output. Useful commands:
          systemctl is-active unbound pdns mariadb burrow-dashboard
          journalctl -u unbound -u pdns -u burrow-dashboard -n 80 --no-pager
          sudo unbound-checkconf
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I tested on a throwaway VM/box (not a production resolver).
          required: false
        - label: I'm on the latest release tag (or I've noted the version above).
          required: false
