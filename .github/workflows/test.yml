name: test
on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r dashboard/app/requirements.txt -r requirements-dev.txt
      - name: Run pytest
        run: pytest -q

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bats
      - name: Run bats
        run: bats tests/bats
