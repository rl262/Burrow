# Burrow — /etc/unbound/unbound.conf.d/burrow-blocklist.conf
# Managed by Burrow.
#
# Includes the generated ad-block list (local-zone "<domain>." always_nxdomain
# directives) produced by /usr/local/sbin/burrow-update-blocklist. The file is
# regenerated by the burrow-blocklist-refresh timer; `unbound-control reload`
# re-reads it. It lives under /etc/unbound/** so the AppArmor read grant covers it.
#
# To add a source: drop a URL in /etc/unbound/blocklist.d/sources.txt (or have
# the dashboard write /etc/unbound/blocklist.d/sources.d/*.txt) then run
# /usr/local/sbin/burrow-update-blocklist.
server:
    # Log every local-zone (block) match so the dashboard can count blocks.
    log-local-actions: yes
    include: "/etc/unbound/blocklist.d/blocklist.conf"
