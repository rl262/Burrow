# Burrow — /etc/unbound/unbound.conf.d/burrow-remote-control.conf
# Managed by Burrow.
#
# Local control socket for `unbound-control reload` / `unbound-control stats`.
# Using the unix socket (not the legacy 127.0.0.1:8953 TCP port) keeps it
# host-local and matches what the AppArmor profile already allows
# (/run/unbound.ctl rw). No control key/cert files needed.
remote-control:
    control-enable: yes
    control-interface: /run/unbound.ctl
