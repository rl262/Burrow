# Burrow — /etc/unbound/unbound.conf.d/zz-burrow-overrides.conf
# Managed by Burrow.
#
# Runtime allow/deny overrides written by the Burrow dashboard. The "zz-"
# prefix makes include-toplevel load this LAST (after the blocklist); Unbound
# applies the LAST local-zone for a given name, so these win:
#   local-zone "<domain>." transparent      -> un-block (allow) a domain
#   local-zone "<domain>." always_nxdomain  -> manually block a domain
#
# The included file lives under /var/lib/unbound/** (NOT /etc/unbound/**) on
# purpose: the AppArmor profile grants unbound read+write there, and the
# non-root dashboard (running as 'burrow') can rewrite it. `unbound-control
# reload` re-reads it, so entries survive the nightly blocklist refresh.
server:
    include: "/var/lib/unbound/burrow/overrides.conf"
