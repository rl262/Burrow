<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site_title }} manager — sign in</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css?v={{ app_version }}">
  <script>(function(){try{var t=localStorage.getItem('dnsm-theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
</head>
<body class="login-body">
  <form class="login-card" method="post" action="/login">
    <div class="brand"><span class="c">{{ site_title }}</span><small>/dns</small></div>
    {% if flashes %}{% for f in flashes %}<div class="flash flash-{{ f.category }}">{{ f.message }}</div>{% endfor %}{% endif %}
    <div class="login-body-inner">
      <p class="lead">authentication required</p>
      <input type="hidden" name="next" value="{{ next }}">
      <label>
        <span class="lbl"><b>password</b></span>
        <div class="inrow"><span class="pr">&gt;</span><input type="password" name="password" autofocus required></div>
      </label>
      <button type="submit" class="primary" title="Sign in">sign in</button>
    </div>
  </form>
</body>
</html>
